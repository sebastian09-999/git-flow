name: Deploy – StreamFlow

on:
  push:
    branches: [main]

# 🔥 Permisos necesarios
permissions:
  contents: write
  deployments: write

jobs:
  test:
    name: Ejecutar Pruebas (antes de deploy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

  deploy:
    name: Desplegar a Producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas (doble verificación)
        run: npm test

      # 🔥 VERSIONAMIENTO INTELIGENTE
      - name: Versionamiento inteligente
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Obtener último commit
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "Último commit: $COMMIT_MSG"

          # Detectar tipo de versión
          if [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            VERSION_TYPE="major"
          elif [[ "$COMMIT_MSG" == feat:* ]]; then
            VERSION_TYPE="minor"
          elif [[ "$COMMIT_MSG" == fix:* ]]; then
            VERSION_TYPE="patch"
          else
            VERSION_TYPE="patch"
          fi

          echo "Tipo de versión: $VERSION_TYPE"

          # Incrementar versión y evitar loop
          npm version $VERSION_TYPE -m "🔖 versión %s [skip ci]"

          git push origin main --follow-tags

      - name: Construir la aplicación
        run: npm run build

      - name: Mostrar información de versión
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "🚀 Iniciando despliegue de StreamFlow"
          echo "📦 Versión: $VERSION"
          echo "🌿 Rama: ${GITHUB_REF#refs/heads/}"
          echo "🔍 Commit: ${GITHUB_SHA:0:7}"

      # ==================== DEPLOY ====================
      - name: Desplegar aplicación
        run: |
          echo "🔄 Iniciando despliegue real..."

          # Ejemplo: Vercel
          # npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}

          # Ejemplo: Railway
          # npx railway deploy

          # Ejemplo: Netlify
          # npx netlify deploy --prod --dir=dist

          echo "✅ Despliegue completado exitosamente"
          echo "🌐 URL de producción: https://streamflow.example.com"